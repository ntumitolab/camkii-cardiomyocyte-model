# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: NRVM CaMKII model
  description: Publish Julia Notebooks via Jupyter Book
  # keywords: []
  authors: ["Wen-Wei Tseng"]
  license: CC-BY-4.0
  open_access: true
  settings:
    output_matplotlib_strings: remove
  github: https://github.com/ntumitolab/camkii-cardiomyocyte-model
  # bibliography:
  #   - references.bib
  # To autogenerate a Table of Contents, run "jupyter book init --write-toc"
  # https://mystmd.org/guide/table-of-contents
  toc:
    - file: index.md
    - file: modeldesc.md
      children:
        - file: fits/u0.ipynb
        - file: fits/fit-camkii.ipynb
    - pattern: "*.ipynb"

site:
  template: book-theme
  options:
    folders: true
    logo_text: "NRVM CaMKII model"
  # favicon: favicon.ico
  # logo: site_logo.png
  # style: ./my-style.css
  nav: []
